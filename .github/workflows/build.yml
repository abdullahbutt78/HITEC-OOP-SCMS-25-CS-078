name: Build SCMS

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Check g++ version
        run: g++ --version

      - name: Compile SCMS
        run: |
          g++ -std=c++17 -Wall -Wextra \
            src/person/Person.cpp \
            src/person/Student.cpp \
            src/person/GradStudent.cpp \
            src/person/Faculty.cpp \
            src/person/Staff.cpp \
            src/course/Course.cpp \
            src/course/Enrollment.cpp \
            src/library/LibraryItem.cpp \
            src/library/Book.cpp \
            src/library/Journal.cpp \
            src/library/Library.cpp \
            src/finance/FeeRecord.cpp \
            src/finance/Invoice.cpp \
            src/hostel/Room.cpp \
            src/hostel/HostelBlock.cpp \
            src/hostel/HostelManager.cpp \
            src/utils/Reports.cpp \
            src/main.cpp \
            -o scms

      - name: Smoke test
        run: |
          mkdir -p data
          echo "0" | ./scms
          echo "Build and smoke test passed!"
